<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Visit Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }
        h1 { 
            text-align: center; 
            color: #00ff9d; 
            margin-bottom: 8px; 
        }
        .subtitle { 
            text-align: center; 
            color: #aaa; 
            margin-bottom: 25px; 
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(0, 255, 157, 0.3);
        }
        .stat-number {
            font-size: 2.6rem;
            font-weight: bold;
            color: #00ff9d;
        }

        .log-button {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 16px 32px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            transition: 0.3s;
        }
        .log-button:hover { 
            background: #00cc7a; 
            transform: scale(1.03); 
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #00ff9d;
        }

        .visits-list {
            max-height: 420px;
            overflow-y: auto;
            margin: 20px 0;
        }
        .visit-item {
            background: rgba(255,255,255,0.08);
            padding: 14px 18px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .visit-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .type-tag {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .cardio { background: #ff6b6b; }
        .weights { background: #4ecdc4; }
        .both { background: #45b7d1; }

        .edit-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .edit-btn:hover {
            background: #2980b9;
        }

        .save-row {
            display: flex;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-clear { background: #d63031; color: white; }
        .btn-export { background: #00b894; color: white; }

        .status {
            text-align: center;
            font-size: 0.9rem;
            margin: 10px 0;
            color: #00ff9d;
        }

        /* Modal for editing */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #16213e;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 420px;
        }
        .modal h3 {
            margin-top: 0;
            color: #00ff9d;
        }
        .modal label {
            display: block;
            margin: 15px 0 8px;
        }
        .modal button {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ Gym Visit Tracker</h1>
        <p class="subtitle">Log your visits • 700 ÷ visits progress</p>

        <div class="status" id="status">💾 Data saved automatically with localStorage</div>

        <div class="stats">
            <div class="stat-card">
                <div>Total Visits</div>
                <div id="total-visits" class="stat-number">0</div>
            </div>
            <div class="stat-card">
                <div>700 ÷ Visits</div>
                <div id="division-result" class="stat-number">—</div>
            </div>
            <div class="stat-card">
                <div>Last Visit</div>
                <div id="last-visit" class="stat-number" style="font-size:1.35rem;">—</div>
            </div>
        </div>

        <div class="checkbox-group">
            <label><input type="checkbox" id="cardio" checked> Cardio</label>
            <label><input type="checkbox" id="weights" checked> Weights</label>
            <label><input type="checkbox" id="both"> Both (Cardio + Weights)</label>
        </div>

        <button onclick="logVisit()" class="log-button">
            ✅ LOG TODAY'S GYM VISIT
        </button>

        <div class="save-row">
            <button onclick="exportData()" class="btn-export">📤 Export Data</button>
            <button onclick="importData()" class="btn-export">📥 Import Data</button>
            <button onclick="clearAllData()" class="btn-clear">🗑️ Clear All</button>
        </div>

        <h2>Visit History (Click edit to change)</h2>
        <div id="visits-list" class="visits-list"></div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Visit</h3>
            <p id="edit-date" style="color:#aaa; margin-bottom:20px;"></p>
            
            <label><strong>Workout Type:</strong></label>
            <select id="edit-type" style="width:100%; padding:10px; border-radius:8px; background:#1e2a4a; color:white; border:none;">
                <option value="Cardio">Cardio</option>
                <option value="Weights">Weights</option>
                <option value="Both">Both (Cardio + Weights)</option>
            </select>

            <div style="margin-top:20px; text-align:center;">
                <button onclick="saveEdit()" style="background:#00ff9d; color:black; padding:12px 30px; border:none; border-radius:8px; font-weight:bold; margin-right:10px;">Save Changes</button>
                <button onclick="closeModal()" style="background:#555; color:white; padding:12px 30px; border:none; border-radius:8px;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let visits = [];
        let currentEditIndex = -1;

        function loadVisits() {
            const saved = localStorage.getItem('gymVisits');
            if (saved) {
                try {
                    visits = JSON.parse(saved);
                } catch (e) {
                    visits = [];
                }
            }
        }

        function saveVisits() {
            localStorage.setItem('gymVisits', JSON.stringify(visits));
        }

        function getTodayShort() {
            return new Date().toISOString().split('T')[0];
        }

        function getDisplayDate() {
            return new Date().toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });
        }

        function logVisit() {
            const today = getTodayShort();

            if (visits.some(v => v.date === today)) {
                if (!confirm("You've already logged today.\nLog another visit anyway?")) return;
            }

            const cardio = document.getElementById('cardio').checked;
            const weights = document.getElementById('weights').checked;
            const both = document.getElementById('both').checked;

            let type = "Gym Visit";
            let typeClass = "both";

            if (both || (cardio && weights)) {
                type = "Both";
                typeClass = "both";
            } else if (cardio) {
                type = "Cardio";
                typeClass = "cardio";
            } else if (weights) {
                type = "Weights";
                typeClass = "weights";
            }

            visits.unshift({
                date: today,
                displayDate: getDisplayDate(),
                type: type,
                typeClass: typeClass,
                timestamp: new Date().toISOString()
            });

            saveVisits();
            updateUI();
        }

        function updateUI() {
            document.getElementById('total-visits').textContent = visits.length;
            document.getElementById('division-result').textContent = 
                visits.length > 0 ? (700 / visits.length).toFixed(2) : '—';
            document.getElementById('last-visit').textContent = 
                visits.length > 0 ? visits[0].displayDate : '—';

            const list = document.getElementById('visits-list');
            list.innerHTML = '';

            if (visits.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#777; padding:60px 20px;">
                    No visits logged yet.<br>Press the button above!
                </p>`;
                return;
            }

            visits.forEach((v, index) => {
                const div = document.createElement('div');
                div.className = 'visit-item';
                div.innerHTML = `
                    <div class="visit-info">
                        <div>${v.displayDate}</div>
                        <div><span class="type-tag ${v.typeClass}">${v.type}</span></div>
                    </div>
                    <button class="edit-btn" onclick="editVisit(${index})">Edit</button>
                `;
                list.appendChild(div);
            });
        }

        // ==================== EDIT FUNCTIONALITY ====================
        function editVisit(index) {
            currentEditIndex = index;
            const visit = visits[index];
            
            document.getElementById('edit-date').textContent = visit.displayDate;
            document.getElementById('edit-type').value = visit.type;
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveEdit() {
            if (currentEditIndex === -1) return;

            const newType = document.getElementById('edit-type').value;
            const visit = visits[currentEditIndex];

            visit.type = newType;
            
            // Update typeClass for styling
            if (newType === "Both") {
                visit.typeClass = "both";
            } else if (newType === "Cardio") {
                visit.typeClass = "cardio";
            } else if (newType === "Weights") {
                visit.typeClass = "weights";
            }

            saveVisits();
            closeModal();
            updateUI();
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
            currentEditIndex = -1;
        }

        function clearAllData() {
            if (confirm("Delete ALL gym visit data? This cannot be undone.")) {
                visits = [];
                localStorage.removeItem('gymVisits');
                updateUI();
            }
        }

        function exportData() {
            if (visits.length === 0) {
                alert("No data to export!");
                return;
            }
            const dataStr = JSON.stringify(visits, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.href = dataUri;
            link.download = `gym-visits-${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        if (Array.isArray(imported)) {
                            visits = imported;
                            saveVisits();
                            updateUI();
                            alert(`✅ Imported ${visits.length} visits!`);
                        }
                    } catch (err) {
                        alert("Error reading file.");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // Initialize
        window.onload = function() {
            loadVisits();
            updateUI();
        };
    </script>
</body>
</html>
